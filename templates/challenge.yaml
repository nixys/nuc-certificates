{{- range $name, $item := (.Values.challenges | default dict) }}
---
{{ include "nuc-certificates.renderResource" (dict
  "root" $
  "item" $item
  "resourceName" $name
  "kind" "Challenge"
  "defaultApiVersion" $.Values.apiVersions.challenge
  "resourceKey" (printf "challenges.%s" $name)
  "namespaced" true
) }}
{{- end }}
