{{- range $name, $item := (.Values.issuers | default dict) }}
---
{{ include "nuc-certificates.renderResource" (dict
  "root" $
  "item" $item
  "resourceName" $name
  "kind" "Issuer"
  "defaultApiVersion" $.Values.apiVersions.issuer
  "resourceKey" (printf "issuers.%s" $name)
  "namespaced" true
) }}
{{- end }}
