{{- range $name, $item := (.Values.clusterIssuers | default dict) }}
---
{{ include "nuc-certificates.renderResource" (dict
  "root" $
  "item" $item
  "resourceName" $name
  "kind" "ClusterIssuer"
  "defaultApiVersion" $.Values.apiVersions.clusterIssuer
  "resourceKey" (printf "clusterIssuers.%s" $name)
  "namespaced" false
) }}
{{- end }}
