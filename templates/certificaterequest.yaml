{{- range $name, $item := (.Values.certificateRequests | default dict) }}
---
{{ include "nuc-certificates.renderResource" (dict
  "root" $
  "item" $item
  "resourceName" $name
  "kind" "CertificateRequest"
  "defaultApiVersion" $.Values.apiVersions.certificateRequest
  "resourceKey" (printf "certificateRequests.%s" $name)
  "namespaced" true
) }}
{{- end }}
