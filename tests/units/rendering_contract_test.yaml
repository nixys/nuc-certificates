suite: rendering contract
templates:
  - templates/certificate.yaml
  - templates/clusterissuer.yaml
release:
  name: unit-test
  namespace: unit-namespace

tests:
  - it: renders no Certificate documents by default
    template: templates/certificate.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: renders no ClusterIssuer documents by default
    template: templates/clusterissuer.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: applies helper defaults and overrides for namespaced resources
    values:
      - values/rendering_contract.values.yaml
    template: templates/certificate.yaml
    documentSelector:
      path: metadata.name
      value: merged-certificate
    asserts:
      - isKind:
          of: Certificate
      - equal:
          path: apiVersion
          value: example.io/v1alpha1
      - equal:
          path: metadata.namespace
          value: unit-namespace
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: certificate-platform
      - equal:
          path: metadata.labels.platform
          value: cert-manager
      - equal:
          path: metadata.labels.component
          value: certificate
      - equal:
          path: metadata.labels.tier
          value: edge
      - equal:
          path: metadata.annotations.team
          value: platform
      - equal:
          path: metadata.annotations.note
          value: edge-tls
      - equal:
          path: spec.secretName
          value: merged-certificate-tls

  - it: renders cluster-scoped resources without namespace and with configured apiVersion
    values:
      - values/rendering_contract.values.yaml
    template: templates/clusterissuer.yaml
    documentSelector:
      path: metadata.name
      value: public-acme
    asserts:
      - isKind:
          of: ClusterIssuer
      - equal:
          path: apiVersion
          value: cert-manager.io/v1beta1
      - notExists:
          path: metadata.namespace
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: certificate-platform
      - equal:
          path: metadata.labels.component
          value: issuer
      - equal:
          path: metadata.annotations.team
          value: platform
      - equal:
          path: metadata.annotations.note
          value: public
      - equal:
          path: spec.acme.email
          value: platform@example.com
