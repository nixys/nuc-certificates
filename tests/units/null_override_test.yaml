suite: null override contract
templates:
  - templates/certificate.yaml
  - templates/clusterissuer.yaml
release:
  name: unit-test
  namespace: unit-namespace

tests:
  - it: skips a default Certificate when a later values file overrides it to null
    values:
      - ../../values.yaml.example
      - values/null_override.values.yaml
    template: templates/certificate.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: keeps unrelated resources when one default entry is overridden to null
    values:
      - ../../values.yaml.example
      - values/null_override.values.yaml
    template: templates/clusterissuer.yaml
    asserts:
      - hasDocuments:
          count: 1
      - containsDocument:
          kind: ClusterIssuer
          apiVersion: cert-manager.io/v1
          name: letsencrypt-production
          any: true
