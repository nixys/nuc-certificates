# -- Override the default chart label name if needed.
nameOverride: ""

# -- Extra labels applied to every rendered resource.
commonLabels: {}
# -- Extra annotations applied to every rendered resource.
commonAnnotations: {}

# The defaults below are aligned with the cert-manager CRDs published upstream.
# Override them if your cluster uses another bundle version.
apiVersions:
  # -- Default apiVersion for Certificate resources.
  certificate: cert-manager.io/v1
  # -- Default apiVersion for CertificateRequest resources.
  certificateRequest: cert-manager.io/v1
  # -- Default apiVersion for Challenge resources.
  challenge: acme.cert-manager.io/v1
  # -- Default apiVersion for ClusterIssuer resources.
  clusterIssuer: cert-manager.io/v1
  # -- Default apiVersion for Issuer resources.
  issuer: cert-manager.io/v1
  # -- Default apiVersion for Order resources.
  order: acme.cert-manager.io/v1

# Each list item supports:
# - name: required
# - namespace: optional for namespaced resources, defaults to the release namespace
# - labels: optional
# - annotations: optional
# - apiVersion: optional override for a single resource
# - spec: arbitrary resource spec
# - status: optional raw status block for fixtures and synthetic manifests

# -- Certificate resources to render.
certificates: []

# -- CertificateRequest resources to render.
certificateRequests: []

# -- Challenge resources to render.
challenges: []

# -- ClusterIssuer resources to render.
clusterIssuers: []

# -- Issuer resources to render.
issuers: []

# -- Order resources to render.
orders: []
